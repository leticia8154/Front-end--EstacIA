<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta charset="utf-8" />
<title>Cadastro - Estacia</title>
<link rel="stylesheet" href="globals.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="modelo-de-rascunho" data-model-id="102:1861">
<section class="container" aria-label="Cadastro de conta">
<header class="container-3">
<div class="image-estacia" aria-hidden="true"></div>
<div class="heading">
<h1 class="text-wrapper-7">Bem-vindo!</h1>
</div>
<div class="paragraph">
<p class="p">Estacionamento inteligente ao seu alcance</p>
</div>
</header>
<nav class="div" aria-label="Alternar entre entrar e cadastrar">
<button class="button" type="button" aria-label="Entrar">
<img class="icon" src="https://c.animaapp.com/O17CjKvw/img/icon.svg" alt="" aria-hidden="true" />
<span class="text-wrapper">Entrar</span>
</button>
<button class="button-2" type="button" aria-current="page" aria-label="Cadastrar">
<img class="img" src="https://c.animaapp.com/O17CjKvw/img/icon-1.svg" alt="" aria-hidden="true" />
<span class="text-wrapper-2">Cadastrar</span>
</button>
</nav>
<form class="form" action="#" method="post">
<div class="container-2">
<label class="label" for="nome-completo">
<img class="icon-2" src="https://c.animaapp.com/O17CjKvw/img/icon-2.svg" alt="" aria-hidden="true" />
<span class="text-wrapper-3">Nome completo</span>
</label>
<div class="div-wrapper">
<input class="text-wrapper-4" id="nome-completo" name="nome-completo" type="text" placeholder="Digite seu nome" autocomplete="name" />
</div>
</div>
<div class="container-2">
<label class="label" for="email">
<img class="icon-2" src="https://c.animaapp.com/O17CjKvw/img/icon-3.svg" alt="" aria-hidden="true" />
<span class="text-wrapper-3">E-mail</span>
</label>
<div class="div-wrapper">
<input class="text-wrapper-4" id="email" name="email" type="email" placeholder="seu@email.com" autocomplete="email" inputmode="email" />
</div>
</div>
<div class="container-2">
<label class="label" for="senha">
<img class="icon-2" src="https://c.animaapp.com/O17CjKvw/img/icon-4.svg" alt="" aria-hidden="true" />
<span class="text-wrapper-3">Senha</span>
</label>
<div class="div-wrapper">
<input class="text-wrapper-4" id="senha" name="senha" type="password" placeholder="••••••••" autocomplete="new-password" />
</div>
</div>
<button class="button-3" type="submit">
<span class="text-wrapper-5">Criar conta</span>
</button>
</form>
<p class="j-tem-uma-conta">Já tem uma conta?</p>
<button class="button-4" type="button">
<span class="text-wrapper-6">Faça login</span>
</button>
</section>
</main>
</body>
</html>
